<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quer sair comigo?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --secondary-pink: #ff8fa3;
            --soft-pink: #fff0f3;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--soft-pink) 0%, #ffe5ec 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            max-width: 90%;
            width: 400px;
            z-index: 10;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container:hover {
            transform: scale(1.02);
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: var(--primary-pink);
            font-size: 2.5rem;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .gif-container {
            margin-bottom: 2rem;
            border-radius: 20px;
            overflow: hidden;
            height: 200px;
            background-color: #fce4ec;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.2);
            font-family: 'Quicksand', sans-serif;
        }

        #btn-sim {
            background-color: var(--primary-pink);
            color: var(--white);
        }

        #btn-sim:hover {
            transform: scale(1.1);
            background-color: #ff0054;
        }

        #btn-nao {
            background-color: #e0e0e0;
            color: #666;
            position: absolute;
            left: 55%;
            top: 0;
            white-space: nowrap;
        }

        /* Heart Animation */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 1.5rem;
            color: var(--primary-pink);
            opacity: 0.5;
            animation: float 6s linear infinite;
            bottom: -50px;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Success Screen */
        .success-message {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .success-message h2 {
            font-family: 'Pacifico', cursive;
            color: var(--primary-pink);
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .success-message p {
            font-size: 1.5rem;
            color: #666;
        }

        .success-gif {
            width: 250px;
            height: 250px;
            margin-bottom: 20px;
            border-radius: 20px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="hearts-bg" id="hearts-bg"></div>

    <div class="container" id="main-card">
        <h1>Quer sair comigo?</h1>
        <div class="gif-container">
            <!-- Using a cute placeholder/placeholder image -->
            <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHlxYzgxYnFmNWZ5bmR3ZGZ4NXA4ZjF4ZXl5ZXl5ZXl5ZXl5ZXl5ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/L95W4M8pOgR16/giphy.gif" alt="Cute Kitten/Love">
        </div>
        <div class="buttons-container">
            <button class="btn" id="btn-sim" onclick="celebrate()">SIM!</button>
            <button class="btn" id="btn-nao" onmouseover="dodgeButton()" ontouchstart="dodgeButton()">NÃO</button>
        </div>
    </div>

    <div class="success-message" id="success-screen">
        <img class="success-gif" src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnJqMXkyYzhxYnM5eHB5bmR3ZGZ4NXA4ZjF4ZXl5ZXl5ZXl5ZXl5ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/kZ1p8V8zTSk0M/giphy.gif" alt="Celebration">
        <h2>Ebaaaa! ❤️</h2>
        <p>Sabia que você ia aceitar!</p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 10 + 15 + 'px';
            document.getElementById('hearts-bg').appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 300);

        function dodgeButton() {
            const btnNao = document.getElementById('btn-nao');
            const container = document.querySelector('.buttons-container');
            
            // Get viewport dimensions
            const vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
            const vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);
            
            // Generate random positions within the screen, keeping comfort margins
            // we use absolute positioning relative to body when it starts moving? 
            // Better: move it randomly across the whole screen.
            
            btnNao.style.position = 'fixed';
            
            const btnRect = btnNao.getBoundingClientRect();
            const maxX = vw - btnRect.width - 20;
            const maxY = vh - btnRect.height - 20;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            btnNao.style.left = randomX + 'px';
            btnNao.style.top = randomY + 'px';
        }

        function celebrate() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';
            
            // Trigger extra hearts
            for(let i = 0; i < 50; i++) {
                setTimeout(createHeart, i * 50);
            }
        }
    </script>
</body>
</html>
