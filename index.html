<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marina Lobo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --secondary-pink: #ff8fa3;
            --soft-pink: #fff0f3;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--soft-pink) 0%, #ffe5ec 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            max-width: 90%;
            width: 400px;
            z-index: 10;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; /* Added to constrain absolute elements */
            overflow: hidden; /* Added to prevent escape */
        }


        .container:hover {
            transform: scale(1.02);
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: var(--primary-pink);
            font-size: 2.5rem;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .gif-container {
            margin-bottom: 2rem;
            border-radius: 20px;
            overflow: hidden;
            height: 200px;
            background-color: #fce4ec;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 5px solid white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.2);
            transition: transform 0.3s ease;
        }

        .gif-container img:hover {
            transform: scale(1.05);
        }


        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.2);
            font-family: 'Quicksand', sans-serif;
        }

        #btn-sim {
            background-color: var(--primary-pink);
            color: var(--white);
        }

        #btn-sim:hover {
            transform: scale(1.1);
            background-color: #ff0054;
        }

        #btn-nao {
            background-color: #e0e0e0;
            color: #666;
            position: absolute; /* Relative to #main-card now */
            right: 40px;
            bottom: 40px;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }




        /* Heart Animation */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 1.5rem;
            color: var(--primary-pink);
            opacity: 0.5;
            animation: float 6s linear infinite;
            bottom: -50px;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.8;
            }

            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Success Screen */
        .success-message {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .success-message h2 {
            font-family: 'Pacifico', cursive;
            color: var(--primary-pink);
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .success-message p {
            font-size: 1.5rem;
            color: #666;
        }

        .success-gif {
            width: 250px;
            height: 250px;
            margin-bottom: 20px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid white;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
        }
    </style>
</head>

<body>
    <div class="hearts-bg" id="hearts-bg"></div>

    <div class="container" id="main-card">
        <h1>Você promete vir passar o final de semana com seu lobinho? 😏🐺</h1>
        <div class="gif-container">
            <!-- Usando a foto que você salvou como foto.jpeg -->
            <img src="foto.jpeg" alt="Nossa Foto">
        </div>


        <div class="buttons-container">
            <button class="btn" id="btn-sim" onclick="celebrate()">SIM!</button>
        </div>
        <button class="btn" id="btn-nao" onmouseover="dodgeButton()" ontouchstart="dodgeButton()" onclick="dodgeButton()">NÃO</button>

    </div>

    <div class="success-message" id="success-screen">
        <img class="success-gif" src="foto.jpeg" alt="Celebration">


        <h2>Escolha correta detectada ✅</h2>
        <p>Agora não tem mais volta 😌 o lobinho já está feliz 🐺❤️</p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 10 + 15 + 'px';
            document.getElementById('hearts-bg').appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 300);

        function dodgeButton() {
            const btnNao = document.getElementById('btn-nao');
            const mainCard = document.getElementById('main-card');
            
            // Constrains the button within the main card using absolute positioning
            const margin = 20;
            const xMax = mainCard.offsetWidth - btnNao.offsetWidth - margin;
            const yMax = mainCard.offsetHeight - btnNao.offsetHeight - margin;

            // Picks a random spot within the container's bounds
            const randomX = Math.floor(Math.random() * (xMax - margin)) + margin;
            const randomY = Math.floor(Math.random() * (yMax - margin)) + margin;
            
            btnNao.style.position = 'absolute';
            btnNao.style.left = randomX + 'px';
            btnNao.style.top = randomY + 'px';
        }



        function celebrate() {
            document.getElementById('main-card').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';

            // Trigger extra hearts
            for (let i = 0; i < 50; i++) {
                setTimeout(createHeart, i * 50);
            }
        }
    </script>
</body>

</html>
